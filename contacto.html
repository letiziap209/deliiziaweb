<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Delizia</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="contenedor nav-contenedor">
            <img src="img/logo.jpeg" alt="Logo Delizia" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="menu.html">Menú</a></li>
                    <li><a href="contacto.html" class="activo">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contenedor seccion">
        <h1 class="titulo-pagina">Haz tu pedido</h1>
        <div class="grid-2">
            <div>
                <h2>¿Tienes un evento?</h2>
                <p>En Delizia preparamos pedidos especiales para cumpleaños, reuniones y eventos corporativos. Escríbenos y personalizamos tu caja de postres.</p>
                <p><strong>Ubicación:</strong> Santo Domingo, RD</p>
                <p><strong>Instagram:</strong> @delizia_do</p>
            </div>
            <div class="contacto-formulario">
                <form class="formulario">
                    <div class="campo">
                        <label>Nombre:</label>
                        <input type="text" placeholder="Tu nombre" required>
                    </div>
                    <div class="campo">
                        <label>Postre favorito:</label>
                        <select>
                            <option>Cookies</option>
                            <option>Brownies</option>
                            <option>Cinnamon Rolls</option>
                            <option>Otros</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Mensaje:</label>
                        <textarea placeholder="¿Cuándo necesitas tu pedido?"></textarea>
                    </div>
                    <button type="submit" class="boton-formulario">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="contenedor">
            <p>&copy; 2026 Delizia. Hecho con amor.</p>
        </div>
    </footer>
</body>
</html>
